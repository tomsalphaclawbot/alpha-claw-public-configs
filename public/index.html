<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Claw Public Config Snapshots</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: Inter, system-ui, sans-serif; margin: 2rem; background: #0f1220; color: #e6ebff; }
      .card { background: #161b2f; border: 1px solid #2a3355; border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 1rem; }
      h1 { margin-top: 0; }
      .meta { color: #a8b3d9; font-size: 0.95rem; }
      code { background: #1f2743; padding: 0.1rem 0.35rem; border-radius: 4px; }
      a { color: #8cb6ff; }
      ul { margin-top: 0.5rem; }
    </style>
  </head>
  <body>
    <h1>Alpha Claw Public Config Snapshots</h1>
    <p class="meta">Sanitized, versioned config metadata for public reference. No secrets are included.</p>
    <p><a href="/api/snapshots">JSON API</a> · <a href="/health">Health</a></p>
    <div id="snapshots"></div>

    <script>
      async function render() {
        const res = await fetch('/api/snapshots');
        const data = await res.json();
        const target = document.getElementById('snapshots');
        data.snapshots.forEach((snap) => {
          const el = document.createElement('section');
          el.className = 'card';
          el.innerHTML = `
            <h2>${snap.version}</h2>
            <p class="meta">Released: ${new Date(snap.releasedAt).toLocaleString()} · Env: <code>${snap.environment}</code></p>
            <p>${snap.summary}</p>
            <strong>Published artifacts</strong>
            <ul>${snap.files.map((f) => `<li><code>${f}</code></li>`).join('')}</ul>
            <p class="meta">${snap.notes}</p>
          `;
          target.appendChild(el);
        });
      }
      render();
    </script>
  </body>
</html>
