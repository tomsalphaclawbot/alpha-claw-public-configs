services:
  alpha-claw-public-configs:
    build: .
    container_name: alpha-claw-public-configs
    ports:
      - "8788:8080"
    restart: unless-stopped

  cloudflared-alpha-claw-public-configs:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-alpha-claw-public-configs
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    depends_on:
      - alpha-claw-public-configs
    restart: unless-stopped
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - /Users/openclaw/.cloudflared/e6a51b1a-94f0-4517-9dbf-98d422e00919.json:/etc/cloudflared/creds.json:ro
